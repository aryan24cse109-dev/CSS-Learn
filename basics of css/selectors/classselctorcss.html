<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Class Selector</title>
    <style>
        /*In Class Selector we select the element by its class and apply styles to it for define class in style , we use . symbol.
        In this file , we will use class selector on two pragraph define in two different type of p and div but there class is same . */
        #first-heading {
            color: red;
        }
        .random_text {
            color: darkgray;
        }
        #Second-heading {
            color: green;
        }
       
        
    </style>
</head>
<body>
    <!-- Here instead of type of elements like h1 for heading and p for paragraph , we can also use div tags -->
     <h1 id="first-heading">This is a heading.</h1>
     <p class="random_text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Amet, laudantium..</p>
    <div id="Second-heading">This is a heading.</div>
    <br>
    <div class="random_text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Magni doloremque voluptate vitae nesciunt consequuntur unde dolore maxime deleniti corrupti soluta.</div>
</body>
</html>
