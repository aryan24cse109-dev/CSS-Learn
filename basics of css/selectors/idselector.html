<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Id Selector</title>
    <style>
        /*In Id Selector we select the element by its id and apply styles to it for define id in style , we use # symbol */
        #first-heading {
            color: red;
        }
        #first-paragraph {
            color: blue;
        }
        #Second-heading {
            color: green;
        }
        #Second-paragraph {
            color: violet;
        }
    </style>
</head>
<body>
    <!-- Here instead of type of elements like h1 for heading and p for paragraph , we can also use div tags -->
     <h1 id="first-heading">This is a heading.</h1>
     <p id="first-paragraph">This is a paragraph.</p>
    <div id="Second-heading">This is a heading.</div>
    <div id="Second-paragraph">This is a paragraph.</div>
</body>
</html>
