<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Height and Width</title>
    <style>
        /* Color and Background-color of text  */
        .frontend_learn {
            color: aquamarine;
            background-color: blue;
        }
        #Backend_Learn {
            color: rgb(209, 35, 35);
            background-color: brown;
        }
        /* Color and Background-color of button */
        button {
            color: rgb(255, 255, 255);
            background-color: rgb(0, 0, 0);
        }
        /*  Height and Width , Color and Background-color of test boxes */
        .box{height: 100px; width: 150px;}
          #box1{color: rgb(49, 33, 33); background-color: rgb(99, 70, 70);}
          #box2{color: rgb(162, 194, 34); background-color: rgb(0, 0, 0);}
          #box3{color: brown; background-color: aqua;}
    </style>
</head>
<body>
    <!-- Color and Background-color Code of text and button -->
    <div class="frontend_learn">Frontend Development</div><br>
    <div id="Backend_Learn">Backend Development</div><br>
    <button class="button">Submit</button> 
    <br>
    <!--  boxes  -->
     <div class="box" id="box1">Box1</div><br>
     <div class="box" id="box2">Box2</div><br>
     <div class="box" id="box3">Box3</div><br>

</body>
</html>
