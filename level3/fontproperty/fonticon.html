    <!-- home icon link -->

    <!-- menu icon link -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />

    <!-- These Links are taken from google icons , also use fontawsome.com -->
    <title>Font Icon</title>
    <style>
        /* The iconwrapper class is used to define the layout of the icons. It uses flexbox to stack the icons vertically and space them out evenly. */
        .iconwrapper{
            display: flex;
        flex-direction: column;         /* Stacks the icons in a vertical line */
        justify-content: space-between; /* Pushes first to top, last to bottom, middle to center */
        align-items: center;            /* Centers icons horizontally on the screen */
        height: 100vh;                  /* Sets container to 100% of the screen height */
        box-sizing: border-box;
        padding: 20px 0;                /* Optional: stops icons from touching the very edge */
        }
    /* The HomeIcon, MenuIcon, and PhotoIcon classes are used to define the styles for each icon. They use the font-variation-settings property to set the fill, weight, grade, and optical size of the icons. */    

.material-symbols-outlined {
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24
}



.material-symbols-outlined {
  font-variation-settings:
  
  'FILL' 0,
  'wght' 400,
    'GRAD' 0,
    'opsz' 24
}

.material-symbols-outlined {
  font-variation-settings:
  
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24
}


</style>
</head>
<body>
    <div class="iconwrapper"> <!-- Icon Wrapper : Use for defining the layout of the icons -->

        <span class="material-symbols-outlined">
home
</span>

add_a_photo
</span>
</body>
