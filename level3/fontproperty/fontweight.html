<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Font Weight</title>
    <style>
        #head{
            font-weight: 100;

        #head2{
            font-weight: 200;
        }
        #first{
            font-weight: 300;
        }
        #second{
            font-weight: 400;
        }
        </style>
        
</head>
<body>

    <h1 id="head2">heading2</h1>
    <p id="second">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Molest
        </p>
</body>
</html>
