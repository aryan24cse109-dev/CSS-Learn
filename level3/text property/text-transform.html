<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Text Transform</title>
    <style>
     #head{
        text-transform: uppercase;
     }
     #head2{
        text-transform: lowercase;
     }
     #head3{
        text-transform: capitalize;
     }
     #head4{
        text-transform: full-width;
     }
        #head5{
            text-transform: none;
        } 
        </style>
        
</head>
<body>
   <h1 id="head">this is my text</h1>
   <h2 id="head2">this is my text</h2> 
   <h3 id="head3">this is my text</h3> 
    <h4 id="head4">this is my text</h4>
    <h5 id="head5">this is my text</h5>
</body>
</html>
