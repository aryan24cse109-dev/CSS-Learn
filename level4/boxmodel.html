<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Box Model</title>
    <style>
        .box1{
            width: 200px;
            height: 200px;
            background-color: lightblue;
            margin: 10px;
            padding: 20px;
        }
        .box2{
            width: 200px;
            height: 200px;
            background-color: lightcoral;
            margin: 10px;
            padding: 20px;
        }
        #first{
            height: 100px;
            width: 100px;
            color: black;
            background-color: lightgreen;
            border: 5px solid black;
            border-radius: 5px;
        }
        #second{
            height: 120px;
            width: 100px;
            color: rgb(172, 21, 21);
            background-color: rgb(165, 165, 43);
            border: 5px solid blueviolet;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="first" class="box1">Padder</div>
    <div id="second" class="box2">Icon</div>
        
</body>
</html>
