<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Display block</title>
    <style>
        
     .box {
        height: 100px;
        width: 100px;
        color:azure;
          background-color: red;
        margin: 5px ;   
          padding: 5px 10px 15px 20px;
          text-align: center;
          border: 5px solid black;
          border-radius: 5px;
          box-sizing: content-box;
          display: block;
}



    </style>
</head>
<body>
    <div id="first" class="box"> Box1</div>
    <span id="second" class="box"> Box2</span>
    <button id="third" class="box"> Box3</button>
    <!-- Always Remember when we use button elements its default box size is border-box -->
</body>
</html>
