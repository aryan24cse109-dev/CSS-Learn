<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>VH Units</title>
<style> 
* {
            margin: 0;
            padding: 0;
        }
        #first{
            height: 10vh; /* 10% of viewport height */
            width: 10vw;  /* 10% of viewport width */
            color: azure;
            background-color: red;
            margin: 5rem;
            padding: 5rem 10rem 15rem 20rem;
            border: 5rem solid black;
            border-radius: 5rem;
            box-sizing: content-box;
        } 
       #second{
            height: 40vh; /* 40% of viewport height */
            width: 10vw; /* 10% of viewport width */
            color:bisque;
            background-color: blueviolet;
            margin: 5rem;
            padding: 5rem 10rem 15rem 20rem;
            border: 5rem solid black;
            border-radius: 5rem;
            box-sizing: content-box;
        }








    
</style>
</head>
<body>
    <div id="first">Box1</div>
    <div id="second">Box2</div>
</body>
</html>
