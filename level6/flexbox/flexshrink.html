<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Flex Shrink</title>
<style>
    * {
            margin: 0;
            padding: 0;
        }
        .box{
            height: 200px;
            width: 200px;
            margin: 5px;
            padding: 5px 10px 15px 20px;
            border: 3px solid black;
            border-radius: 5px;
            box-sizing: content-box;
            text-align: center;
            background-color: red;
            color: azure;
            }
        .container{
            height:300px;
            width:600px;
            background-color: #222;
            color: azure;
            margin: 5px;
            padding: 5px 10px 15px 20px;
            border: 3px solid hotpink;
            border-radius: 5px;

            display: flex;
            flex-direction: row;
            justify-content:flex-start; 
            
        }
        #second{
            flex-shrink: 2;
        }
        #third{
            flex-grow: 1;
        }
        </style>



</head>
<body>
     <h1 id ="heading" text align : Center >Flex Container</h1>
    <div class="container">
        <div class="box" id="first">Box1</div>
        <div class="box" id="second">Box2</div>
        <div class="box" id="third">Box3</div>
        <div class="box" id="fourth">Box4</div>
    </div>
</body>
</html>
