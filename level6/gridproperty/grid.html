<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Grid</title>
    <style> 
    .container{
        height:400px;
        width:400px;
        display: grid;
        grid-template-columns: 50px 50px;
        grid-template-rows: 50px 50px;

    }
    .item1{
        background-color: red;
        color: azure;
        grid-column: 1 / 2;
        grid-row: 1 / 2;
    }
    .item2{
        background-color: blueviolet;
        color: bisque;
        grid-column: 2 / 2;
        grid-row: 1 / 2;
    } 
    .item3{
          background-color: green;
          color: white;
          grid-column: 1 / 2;
          grid-row: 2 / 2;
     }
    .item4{
          background-color: orange;
          color: black;
          grid-column: 2 / 2;
          grid-row: 2 / 2;
    }
    </style>
        

</head>
<body>
      <h1 id ="heading" text align : Center >Grid Container</h1>
    <div class="container">
        <div class="item1" id="first">item1</div>
        <div class="item2" id="second">item2</div>
        <div class="item3" id="third">item3</div>
        <div class="item4" id="fourth">item4</div>
    </div>
</body>
</html>
