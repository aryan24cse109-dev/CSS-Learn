<!DOCTYPE html>
<html lang="en">
<head>
    
    <title> Transform: Scale</title>
    <style>
        .box{
            background-color: blue;
            color: white;
            height: 100px;
            width: 100px;
            border-radius: 5px;
            border: 10px solid black;
            transition: all  ease-in-out 0s;
        }
        #box1{
            background-color: blue;
            color: white;
        }
        #box1:hover{
             transform: scale(1.5);
        }
        #box2{
            background-color: orange;
            color: black;
        }
        
        #box2:active{
            transform: scale(2.5);
        }
        #box3{
            background-color: red;
            color: aqua;
        }
        #box3:active{
            transform: scaleX(4);
        }
        #box4{
            background-color: green;
            color: aquamarine;
        }
        #box4:active{
           transform: scaleY(6);
        }
        #box5{
            background-color: yellow;
            color: black;
        }
        #box5:active{
          transform: scale(0, -5);
        }
</style>
</head>
<body>
    <div class="box" id="box1">Box1</div>
    <div class="box" id="box2">Box2</div>
    <div class="box" id="box3">Box3</div>
    <div class="box" id="box4">Box4</div>
    <div class="box" id="box5">Box5</div>
    
</body>
</html>
