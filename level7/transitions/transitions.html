<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Pseudo-classes</title>
    <style>
        .click{
            background-color: blue;
            color: white;
           height: 50px;
            width: 100px;
            border-radius: 5px;
            border: 10px solid black;

            transition: all ;
            transition-duration: 0.5s;
            transition-timing-function: steps(4);
            transition-delay: 0s;
            }
            .click:hover{
                height: 60px;
                width: 110px;
                background-color: red;
            }
            .click:active{
                height: 70px;
                width: 120px;
                background-color: green;
            }
    </style>
</head>
<body>
    <button class="click">Click Me</button>
    
</body>
</html>
